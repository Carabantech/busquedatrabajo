# Portal Scanner Configuration

title_filter:
  positive:
    - "IT Manager"
    - "IT Operations Manager"
    - "Head of IT"
    - "Director of IT"
    - "Infrastructure Manager"
    - "Operations Manager"
    - "Service Delivery"
    - "Technology Manager"
    - "Technical Operations Manager"
    - "Infrastructure Lead"
    - "Cloud Infrastructure Manager"
    - "IT Lead"
    - "Jefe de IT"
    - "Jefe de Sistemas"
    - "Jefe de Infraestructura"
    - "Lider de Infraestructura"
    - "Responsable de IT"
    - "Responsable de Sistemas"
    - "Coordinador IT"
    - "Coordinador de Infraestructura"
    - "Gerente de IT"
    - "Gerente de Tecnologia"
    - "Gerente de Sistemas"
    - "Gerente de Infraestructura"
    - "Lider de Operaciones IT"
    - "Jefe de Operaciones IT"
    - "Administrador de Infraestructura"
    - "IT Operations"
  negative:
    - "Junior"
    - "Intern"
    - "Sales"
    - "Account Executive"
    - "Recruiter"
    - "Designer"
    - "Frontend"
    - "Backend"
    - "Full Stack"
    - "Data Scientist"
    - "ML Engineer"
    - "AI Engineer"
    - "Product Manager"
    - "Project Manager"
    - "Program Manager"
    - "Technical Program Manager"
    - "Marketing"
    - "QA"
    - "Quality Assurance"
    - "Support Engineer"
    - "Help Desk"
    - "Analyst"
    - "Analista"
    - "Developer"
    - "Desarrollador"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Head"
    - "Director"

search_queries:
  - name: LinkedIn - IT Mendoza
    query: 'site:linkedin.com/jobs/view "Mendoza" ("IT Manager" OR "Head of IT" OR "Infrastructure Manager" OR "Jefe de Infraestructura" OR "Jefe de Sistemas" OR "Coordinador IT")'
    enabled: true

  - name: LinkedIn - Argentina Remote IT
    query: 'site:linkedin.com/jobs/view ("Argentina" OR remoto) ("IT Manager" OR "Infrastructure Manager" OR "Head of IT" OR "Gerente de IT" OR "Service Delivery Manager")'
    enabled: true

  - name: Indeed - Mendoza IT
    query: 'site:ar.indeed.com/q-it-l-mendoza%2C-mendoza-empleos ("IT Manager" OR "Jefe de Infraestructura" OR "Jefe de Sistemas" OR "Gerente de IT" OR "Coordinador IT")'
    enabled: true

  - name: Glassdoor - Mendoza Infra
    query: 'site:glassdoor.com/Job/mendoza ("IT Manager" OR "Infrastructure Manager" OR "Jefe de Infraestructura" OR "Head of IT")'
    enabled: true

  - name: Bumeran - IT Argentina
    query: 'site:bumeran.com.ar ("IT Manager" OR "Jefe de Infraestructura" OR "Jefe de Sistemas" OR "Gerente de IT" OR "Responsable de IT")'
    enabled: true

  - name: Computrabajo - IT Mendoza
    query: 'site:computrabajo.com.ar "Mendoza" ("IT Manager" OR "Jefe de Infraestructura" OR "Jefe de Sistemas" OR "Coordinador IT" OR "Operaciones IT")'
    enabled: true

  - name: Argentina Remote - Infra and Ops
    query: '("Argentina" OR remoto) ("Infrastructure Manager" OR "IT Operations Manager" OR "Head of IT" OR "Jefe de Infraestructura" OR "Gerente de IT")'
    enabled: true

  - name: LinkedIn - Jefe de Infraestructura Argentina
    query: 'site:linkedin.com/jobs/view Argentina ("Jefe de Infraestructura" OR "Jefe de Sistemas" OR "Responsable de IT" OR "Gerente de Tecnologia")'
    enabled: true

  - name: Indeed - Infraestructura Argentina
    query: 'site:ar.indeed.com ("Jefe de Infraestructura" OR "Gerente de Sistemas" OR "Responsable de IT" OR "Coordinador de Infraestructura") Argentina'
    enabled: true

  - name: Ashby - IT Leadership
    query: 'site:jobs.ashbyhq.com "IT Manager" OR "Head of IT" OR "IT Operations Manager" remote'
    enabled: true

  - name: Greenhouse - Infra and Ops
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Infrastructure Manager" OR "IT Operations" OR "Director of IT" remote'
    enabled: true

  - name: Lever - IT Operations
    query: 'site:jobs.lever.co "IT Manager" OR "Infrastructure" OR "Cloud Operations" remote'
    enabled: true

  - name: Workable - IT Manager
    query: 'site:apply.workable.com "IT Manager" OR "IT Operations Manager" OR "Head of IT"'
    enabled: true

