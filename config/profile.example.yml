# Career-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Se completa con el nombre del candidato"
  email: "se-completa@con-el-candidato.com"
  phone: "+00 0000 000000"
  location: "Se completa con la ubicacion del candidato"
  linkedin: "linkedin.com/in/se-completa-con-el-candidato"
  portfolio_url: "https://portfolio-del-candidato.dev"
  github: "github.com/usuario-del-candidato"
  twitter: "https://x.com/usuario-del-candidato"
  # (Optional) Canva resume design ID for visual CV generation via /career-ops pdf.
  # Find it in your Canva design URL: https://www.canva.com/design/DAxxxxxxx/...
  # The ID starts with "D" and is 11 characters long.
  # canva_resume_design_id: "DAxxxxxxxxx"

target_roles:
  # Your North Star roles — what you're optimizing for
  primary:
    - "Senior AI Engineer"
    - "Staff ML Engineer"
  # Archetypes help the evaluation system score fit
  archetypes:
    - name: "AI/ML Engineer"
      level: "Senior/Staff"
      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "AI Product Manager"
      level: "Senior"
      fit: "secondary"
    - name: "Solutions Architect"
      level: "Mid-Senior"
      fit: "adjacent"

narrative:
  # Your professional headline (1 line)
  headline: "Se completa con el resumen profesional del candidato"
  # Your exit story — what makes you unique
  exit_story: "Se completa con la narrativa profesional del candidato."
  # Your top 3-5 superpowers
  superpowers:
    - "Fortaleza principal del candidato 1"
    - "Fortaleza principal del candidato 2"
    - "Fortaleza principal del candidato 3"
  # Proof points — projects, articles, case studies with measurable impact
  proof_points:
    - name: "Proyecto o experiencia destacada del candidato"
      url: "https://ejemplo.com/proyecto"
      hero_metric: "Resultado o metrica principal del candidato"
    - name: "Caso o portfolio relevante del candidato"
      url: "https://ejemplo.com/caso"
      hero_metric: "Impacto medible"
  # Optional: dashboard/demo URL with credentials
  # dashboard:
  #   url: "https://portfolio-del-candidato.dev/demo"
  #   password: "demo-2026"

compensation:
  target_range: "$150K-200K"     # Your target total comp
  currency: "USD"
  minimum: "$120K"               # Walk-away number
  location_flexibility: "Remote preferred, 1 week/month on-site possible"

location:
  country: "United States"
  city: "San Francisco"
  timezone: "PST"
  visa_status: "No sponsorship needed"
  # For remote roles outside your country:
  # onsite_availability: "1 week/month in any city"
